version: '3.8'

services:
  web:
    build: .
    container_name: lms_web
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DEBUG=1
      - SECRET_KEY=django-insecure-key-lms-2026
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASS=lms_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=lms_analytics
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - db
      - redis
      - mongodb
      - rabbitmq
    networks:
      - lms_network

  db:
    image: postgres:15-alpine
    container_name: lms_db
    restart: always
    environment:
      - POSTGRES_DB=lms_db
      - POSTGRES_USER=lms_user
      - POSTGRES_PASSWORD=lms_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - lms_network

  redis:
    image: redis:7-alpine
    container_name: lms_redis
    ports:
      - "6379:6379"
    networks:
      - lms_network

  mongodb:
    image: mongo:7
    container_name: lms_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - lms_network

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    platform: linux/amd64
    container_name: lms_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - lms_network

  celery-worker:
    build: .
    container_name: lms_celery_worker
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    environment:
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASS=lms_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=lms_analytics
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - db
      - redis
      - mongodb
      - rabbitmq
    networks:
      - lms_network

  celery-beat:
    build: .
    container_name: lms_celery_beat
    command: celery -A config beat --loglevel=info
    volumes:
      - .:/app
    environment:
      - DB_NAME=lms_db
      - DB_USER=lms_user
      - DB_PASS=lms_password
      - DB_HOST=db
      - DB_PORT=5432
      - REDIS_URL=redis://redis:6379/1
      - MONGO_URI=mongodb://mongodb:27017/
      - MONGO_DB_NAME=lms_analytics
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - web
      - redis
      - mongodb
      - rabbitmq
    networks:
      - lms_network

  flower:
    build: .
    container_name: lms_flower
    command: celery -A config flower --port=5555
    ports:
      - "5555:5555"
    environment:
      - CELERY_BROKER_URL=amqp://guest:guest@rabbitmq:5672//
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - rabbitmq
      - redis
      - celery-worker
    networks:
      - lms_network

volumes:
  postgres_data:
  mongodb_data:

networks:
  lms_network:
    driver: bridge